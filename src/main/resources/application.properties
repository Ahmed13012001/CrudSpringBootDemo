spring.application.name=CrudSpringBootDemo

#cfg properties to connect to MySQL DB
spring.datasource.url = jdbc:mysql://localhost:3306/student_crud_db
spring.datasource.username = root
spring.datasource.password = root

#JPA.Hibernate properties to display,format query generated by Hibernate in terminal
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true